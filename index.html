<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone DG - Catálogo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>iPhone DG</h1>
    <p>Accesorios premium para Apple</p>
  </header>

  <main>
    <section id="productos" class="grid"></section>
  </main>

  <script src="script.js"></script>
  <script>
async function cargarProductos() {
    const url = "https://docs.google.com/spreadsheets/d/1HgatiIRzh5rHRDL-zoNOyydqQYCVVSJ05J2HCz_NGKo/edit?usp=sharing&output=csv";

    const respuesta = await fetch(url);
    const texto = await respuesta.text();

    const filas = texto.split("\n").map(f => f.split(","));

    let html = "";

    for (let i = 1; i < filas.length; i++) {
        const [nombre, precio, imagen] = filas[i];

        html += `
            <div class="producto">
                <img src="${imagen}" alt="${nombre}">
                <h3>${nombre}</h3>
                <p>$${precio}</p>
            </div>
        `;
    }

    document.getElementById("catalogo").innerHTML = html;
}

cargarProductos();
</script>
<div id="catalogo"></div>

</body>
</html>
